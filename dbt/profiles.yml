ecommerce_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres
      port: 5432
      user: postgres
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: analytics
      schema: marts
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
      retries: 1