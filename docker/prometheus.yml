global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'anomaly-detector'
    static_configs:
      - targets: ['anomaly-detector:8000']
    scrape_interval: 30s

  - job_name: 'redpanda'
    static_configs:
      - targets: ['redpanda:9644']
    scrape_interval: 30s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']
    scrape_interval: 30s