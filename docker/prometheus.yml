global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'anomaly-detector'
    static_configs:
      - targets: ['host.docker.internal:8000']
    scrape_interval: 5s

  - job_name: 'producer'
    static_configs:
      - targets: ['host.docker.internal:8001']
    scrape_interval: 5s

  - job_name: 'consumer'
    static_configs:
      - targets: ['host.docker.internal:8002']
    scrape_interval: 5s